name: Multi-Platform Binary Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed \
            --add-data "src/image23dprint/assets:image23dprint/assets" \
            --name "Image23DPrint-${{ runner.os }}" \
            src/image23dprint/__main__.py

      - name: Build Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed `
            --add-data "src/image23dprint/assets;image23dprint/assets" `
            --name "Image23DPrint-Windows" `
            src/image23dprint/__main__.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/Image23DPrint-*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
